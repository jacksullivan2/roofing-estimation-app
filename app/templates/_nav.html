{# Shared top nav. Pass `active` ('projects') to highlight the section. #}
<a href="/projects"
   class="{% if active == 'projects' %}text-slate-deep font-semibold border-b-2 border-slate-deep pb-0.5{% else %}text-slate-500 hover:text-slate-deep transition-colors{% endif %}">
  Projects
</a>
{% if auth_enabled %}
<span class="text-slate-300">|</span>
<form method="post" action="/logout" class="inline">
  <button class="text-slate-500 hover:text-slate-deep transition-colors" type="submit">
    Sign out
  </button>
</form>
{% endif %}
