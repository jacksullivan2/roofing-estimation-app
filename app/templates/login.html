{% extends "base.html" %}
{% block title %}Sign in · Roofing Estimator{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16 bg-white border border-slate-200 rounded-xl p-8 shadow-sm">
  <h1 class="text-lg font-semibold text-slate-deep mb-1">Sign in</h1>
  <p class="text-sm text-slate-500 mb-6">Enter the access password to continue.</p>
  {% if error %}
  <div class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
    {{ error }}
  </div>
  {% endif %}
  <form method="post" action="/login" class="space-y-4">
    <input type="password" name="password" autofocus required
           placeholder="Password"
           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-slate-mid focus:ring-2 focus:ring-slate-soft outline-none" />
    <button type="submit"
            class="w-full bg-slate-deep hover:bg-slate-mid text-white text-sm font-medium rounded-lg px-4 py-2 transition-colors">
      Continue
    </button>
  </form>
</div>
{% endblock %}
